<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat 留言板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="聊天室資訊">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">C</div>
          <div>
            <h1>Chat 留言板</h1>
            <p>即時感留言空間</p>
          </div>
        </div>

        <div class="profile-panel">
          <label for="displayName">你的暱稱</label>
          <div class="name-row">
            <select id="displayName" aria-describedby="nameHint" required></select>
            <button id="saveName" class="icon-button" type="button" aria-label="儲存暱稱" title="儲存暱稱">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
                <path d="M17 21v-8H7v8" />
                <path d="M7 3v5h8" />
              </svg>
            </button>
          </div>
          <p id="nameHint" class="field-hint">請先填寫暱稱，才能送出留言。</p>
        </div>

        <div class="room-list" aria-label="房間列表">
          <button class="room active" type="button">
            <span class="dot"></span>
            <span>公開留言</span>
            <small id="messageCount">0</small>
          </button>
          <button class="room" type="button">
            <span class="dot muted"></span>
            <span>公告</span>
            <small>唯讀</small>
          </button>
        </div>

        <section class="sync-card" aria-label="同步狀態">
          <p class="sync-label">資料同步</p>
          <strong>Google Sheet 留言紀錄</strong>
          <p id="sheetHint">送出後會同步寫入班級試算表。</p>
        </section>
      </section>

      <section class="chat-panel" aria-label="留言板">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Public Room</p>
            <h2>公開留言</h2>
            <p class="chat-subtitle">依照畢業紀念冊留言板的送出方式，整理成對話流聊天室。</p>
          </div>
          <div class="status">
            <span aria-hidden="true"></span>
            已連接試算表
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="messageForm" class="composer">
          <div class="composer-main">
            <textarea
              id="messageInput"
              maxlength="500"
              rows="1"
              placeholder="寫一句想留給大家的話..."
              aria-label="留言內容"
            ></textarea>
            <div class="composer-meta">
              <p id="messageStatus" class="message-status" aria-live="polite"></p>
              <button class="send-button" type="submit" aria-label="送出留言" title="送出留言">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m22 2-7 20-4-9-9-4Z" />
                  <path d="M22 2 11 13" />
                </svg>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="avatar"></div>
        <div class="bubble">
          <div class="meta">
            <strong></strong>
            <time></time>
          </div>
          <p></p>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
